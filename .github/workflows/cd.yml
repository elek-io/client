name: CD

on:
  push:
    branches:
      - main
concurrency: ${{ github.workflow }}-${{ github.ref }}

# contents:write is needed by every job: changesets pushes commits, prepare-release
# and build-and-upload publish to GitHub Releases. pull-requests:write is only used by the
# changesets job to open the release pull request, so it is scoped to that job.
permissions:
  contents: write

jobs:
  changesets:
    name: Create or update release pull request
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    # Opening the release pull request needs pull-requests:write, scoped to this job
    permissions:
      contents: write
      pull-requests: write
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run checks
        run: pnpm run check
      - name: Create or update pull request
        id: changesets
        uses: changesets/action@v1
        with:
          title: 'WIP: Release x.x.x'
          commit: Release new version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  prepare-release:
    name: Prepare the draft GitHub Release
    needs: changesets
    # This runs on the release pull request merge, but also on any other push to
    # main that carries no changesets. The step below tells the two apart.
    if: needs.changesets.outputs.hasChangesets == 'false'
    timeout-minutes: 5
    runs-on: ubuntu-24.04
    outputs:
      # false when this version is already released, so the platform builds are skipped
      should_release: ${{ steps.draft.outputs.should_release }}
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
      # electron-builder finds a draft release by tag and uploads into it, but it
      # never writes the release body. Create the one draft up front with the
      # changelog notes, so every platform runner uploads into the same populated
      # draft instead of each racing to create its own empty one.
      - name: Create or update the draft release with changelog notes
        id: draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          # A published release for this tag means this is a changeset-free push, not
          # a new version. Skip the build matrix instead of rebuilding and overwriting
          # the published notes. An existing draft (a re-run) still proceeds.
          if [ "$(gh release view "$TAG" --json isDraft --jq .isDraft 2>/dev/null)" = "false" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "$TAG is already published, skipping the release build" >&2
            exit 0
          fi
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          # Take this version's section from the changeset generated CHANGELOG
          NOTES=$(awk -v ver="## ${VERSION}" '
            $0 == ver {capture=1; next}
            capture && /^## / {exit}
            capture {print}
          ' CHANGELOG.md)
          # Fail loudly rather than publish a draft with an empty body
          if [ -z "$NOTES" ]; then
            echo "No CHANGELOG.md section found for $TAG" >&2
            exit 1
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            printf '%s\n' "$NOTES" | gh release edit "$TAG" --notes-file -
          else
            # Pin the tag to this built commit, so publishing the draft later tags
            # this commit and not whatever is at the head of main at that time.
            printf '%s\n' "$NOTES" | gh release create "$TAG" \
              --draft --title "$TAG" --target "${{ github.sha }}" --notes-file -
          fi

  build-and-upload:
    name: Building and uploading on ${{ matrix.platform }}
    needs: [changesets, prepare-release]
    # Only run when prepare-release produced a fresh draft to publish into
    if: needs.prepare-release.outputs.should_release == 'true'
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # Mirrors the platforms and Node.js version @elek-io/core tests on
        platform: [ubuntu-24.04, macos-15-intel, macos-15, windows-2025]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # electron-builder's pacman target builds through fpm, which shells out to
      # bsdtar to write the package .MTREE. The Ubuntu runner does not ship it,
      # so install it here. bsdtar comes from libarchive-tools.
      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools
      - name: Build and upload to a draft GitHub Release
        run: pnpm run build --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Lets @sentry/vite-plugin create the release and upload source maps so
          # production crashes are symbolicated. The plugin reads this env var by
          # default. Without it the build still succeeds, just without upload.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      # @elek-io/core is externalized from the main build and loaded from
      # node_modules, so @sentry/vite-plugin never touches it. Upload Core's
      # self-contained node source map to the same release so a forwarded
      # CoreError frame resolves to Core's TypeScript source. Core's map is
      # identical on every platform, so run this once on Linux instead of racing
      # duplicate artifacts from all four runners. The release name and the
      # url-prefix must match electron.vite.config.ts and src/shared/sentryCoreError.ts.
      - name: Upload @elek-io/core source map to Sentry
        if: runner.os == 'Linux'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "No SENTRY_AUTH_TOKEN, skipping Core source map upload" >&2
            exit 0
          fi
          RELEASE="desktop@$(node -p "require('./package.json').version")"
          pnpm exec sentry-cli sourcemaps upload \
            --org elek-io --project desktop \
            --release "$RELEASE" \
            --url-prefix '~/node_modules/@elek-io/core/dist/node' \
            node_modules/@elek-io/core/dist/node
