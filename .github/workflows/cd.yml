name: CD

on:
  push:
    branches:
      - main
concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # Required for pushing commits via changesets action
  pull-requests: write # Required for creating release PRs via changesets action

jobs:
  changesets:
    name: Create or update release pull request
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run lint, check types and formatting
        run: pnpm run lint && pnpm run check-types && pnpm run check-format
      - name: Create or update pull request
        id: changesets
        uses: changesets/action@v1
        with:
          title: 'WIP: Release x.x.x'
          commit: Release new version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    name: Create the draft GitHub Release
    needs: changesets
    # Only after the release pull request has been merged, before the platform builds
    if: needs.changesets.outputs.hasChangesets == 'false'
    timeout-minutes: 5
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
      # electron-builder finds a draft release by tag and uploads into it, but it
      # never writes the release body. Create the one draft up front with the
      # changelog notes, so every platform runner uploads into the same populated
      # draft instead of each racing to create its own empty one.
      - name: Create or update the draft release with changelog notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          # Take this version's section from the changeset generated CHANGELOG
          NOTES=$(awk -v ver="## ${VERSION}" '
            $0 == ver {capture=1; next}
            capture && /^## / {exit}
            capture {print}
          ' CHANGELOG.md)
          if gh release view "$TAG" >/dev/null 2>&1; then
            printf '%s\n' "$NOTES" | gh release edit "$TAG" --notes-file -
          else
            printf '%s\n' "$NOTES" | gh release create "$TAG" \
              --draft --title "$TAG" --target "${{ github.sha }}" --notes-file -
          fi

  release:
    name: Releasing on ${{ matrix.platform }}
    needs: [changesets, create-release]
    # Only build once the release pull request has been merged
    if: needs.changesets.outputs.hasChangesets == 'false'
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # Mirrors the platforms and Node.js version @elek-io/core tests on
        platform: [ubuntu-24.04, macos-15-intel, macos-15, windows-2025]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # electron-builder's pacman target builds through fpm, which shells out to
      # bsdtar to write the package .MTREE. The Ubuntu runner does not ship it,
      # so install it here. bsdtar comes from libarchive-tools.
      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools
      - name: Build and upload to a draft GitHub Release
        run: pnpm run build --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
