name: CI
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  test:
    name: Testing on ${{ matrix.platform }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # Mirrors the platforms and Node.js version @elek-io/core tests on
        platform: [ubuntu-24.04, macos-15-intel, macos-15, windows-2025]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run lint, check types and formatting
        run: pnpm run lint && pnpm run check-types && pnpm run check-format
      # - name: Identify misconfigurations and security anti-patterns
      #   uses: doyensec/electronegativity-action@v2
      # - name: Upload report
      #   uses: github/codeql-action/upload-sarif@v1
      # with:
      #   sarif_file: ../electronegativity_results
      - name: Build
        run: pnpm run build
      # Temporary diagnostics for the E2E launch hang on Windows runners:
      # launches the exe directly with the same flags, env and argument
      # Playwright uses, to check that both inspector announcements appear
      # on stderr. Remove once the hang is understood.
      - name: Diagnose Electron launch (temporary)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = "dist\win-unpacked\elek.io Client.exe"
          $env:ELECTRON_ENABLE_LOGGING = "1"

          Write-Host "=== 1) Playwright's flags: --inspect=0 --remote-debugging-port=0 (15s)"
          $p = Start-Process -FilePath $exe -ArgumentList "--inspect=0","--remote-debugging-port=0" -RedirectStandardOutput out1.txt -RedirectStandardError err1.txt -PassThru
          Start-Sleep -Seconds 15
          if ($p.HasExited) { Write-Host "exited with code $($p.ExitCode)" } else { Write-Host "still running"; taskkill /PID $p.Id /T /F }
          Write-Host "--- stdout:"; Get-Content out1.txt -ErrorAction SilentlyContinue
          Write-Host "--- stderr:"; Get-Content err1.txt -ErrorAction SilentlyContinue

          Write-Host "=== 2) Same flags plus the test fixture's env and main path argument (15s)"
          $isolatedHome = Join-Path $env:RUNNER_TEMP "e2e-home"
          New-Item -ItemType Directory -Force -Path $isolatedHome | Out-Null
          $env:NODE_ENV = "test"
          $env:HOME = $isolatedHome
          $env:USERPROFILE = $isolatedHome
          $p = Start-Process -FilePath $exe -ArgumentList "--inspect=0","--remote-debugging-port=0","dist\win-unpacked\resources\app.asar\out\main\index.js" -RedirectStandardOutput out2.txt -RedirectStandardError err2.txt -PassThru
          Start-Sleep -Seconds 15
          if ($p.HasExited) { Write-Host "exited with code $($p.ExitCode)" } else { Write-Host "still running"; taskkill /PID $p.Id /T /F }
          Write-Host "--- stdout:"; Get-Content out2.txt -ErrorAction SilentlyContinue
          Write-Host "--- stderr:"; Get-Content err2.txt -ErrorAction SilentlyContinue
          Write-Host "--- wrote isolated app data: $(Test-Path (Join-Path $isolatedHome 'elek.io'))"
          exit 0
      # Invoke the runner directly, since "pnpm run test" would rebuild
      # the app that the build step above already built
      - name: Run E2E tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" pnpm exec playwright test
      - name: Run E2E tests (macOS)
        if: runner.os == 'macOS'
        run: pnpm exec playwright test
      - name: Run E2E tests (Windows)
        if: runner.os == 'Windows'
        # DEBUG is temporary, to log the spawn command and every line of
        # process output Playwright receives during the Electron launch
        # handshake. Remove once the launch hang is understood.
        env:
          DEBUG: pw:api,pw:browser*
        run: pnpm exec playwright test
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.platform }}
          path: playwright-report/
          retention-days: 30
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-${{ matrix.platform }}
          path: test-results/
          retention-days: 7
      # Uncomment if necessary
      # For example to inspect the build applications
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact_${{ matrix.platform }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.snap
            dist/*.deb
          if-no-files-found: error
