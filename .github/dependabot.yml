version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    # Land related bumps in one pull request, so they trigger one CI matrix run
    # instead of one run per dependency.
    groups:
      npm-minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'
    ignore:
      # Keep @types/node's major aligned with the Node runtime in .node-version
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
  # Keep the workflow action versions current too, since they are pinned by tag
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
