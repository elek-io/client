appId: io.elek.desktop
productName: 'elek.io Desktop'
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  # Contributor docs, tests, changesets, build scripts, dev configs and
  # Playwright output are not part of the running app, so keep them out of the asar
  - '!contributing/*'
  - '!tests/*'
  - '!scripts/*'
  - '!.changeset/*'
  - '!{test-results,playwright-report}/*'
  - '!{AGENTS.md,CLAUDE.md,components.json,eslint.config.mjs,.node-version}'
  - '!{playwright.config.ts,pnpm-workspace.yaml,.prettierrc.json}'
extraMetadata:
  name: 'elek-io-desktop' # Overwrites package.json name, since it cannot handle special characters
asarUnpack:
  - resources/**
win:
  executableName: 'elek.io Desktop'
nsis:
  # No version in the name so github.com/.../releases/latest/download/<file> stays
  # a stable link. Trade-off: Windows differential updates fall back to a full
  # download, since electron-updater derives the old blockmap URL by version.
  artifactName: elek-io-desktop-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  # Include the arch so Intel and ARM artifacts do not overwrite each other in the shared release
  artifactName: elek-io-desktop-${arch}.${ext}
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
  # Publish each mac arch under its own channel so the per-arch update metadata
  # files do not overwrite each other. electron-builder only adds an arch suffix
  # to latest-*.yml on Linux, so without this both runners write latest-mac.yml.
  # x64 emits latest-x64-mac.yml and arm64 emits latest-arm64-mac.yml, and each
  # build bakes its own channel into app-update.yml.
  publish:
    provider: github
    releaseType: draft
    channel: latest-${arch}
dmg:
  artifactName: elek-io-desktop-${arch}.${ext}
linux:
  # All four targets are auto-updatable via electron-updater (AppImage, deb,
  # rpm, pacman), so each one keeps in-app updates working. snap is
  # intentionally excluded: electron-updater cannot update it (only the Snap
  # Store can), so it would only add size without the update path.
  target:
    - AppImage
    - deb
    - rpm
    - pacman
  category: Office
  # Name the installed .desktop file after desktopName in package.json
  # (io.elek.desktop.desktop) so it matches StartupWMClass and the app_id
  # Electron reports at runtime. Without it the desktop environment cannot link
  # running windows to the entry and shows a generic icon.
  syncDesktopName: true
# Linux builds are x64 only (see the CI matrix), so version-less and arch-less
# names are unambiguous and keep the latest-download links stable.
appImage:
  artifactName: elek-io-desktop.${ext}
deb:
  artifactName: elek-io-desktop.${ext}
rpm:
  artifactName: elek-io-desktop.${ext}
pacman:
  artifactName: elek-io-desktop.${ext}
npmRebuild: false
# The CD workflow pre-creates one draft GitHub Release per version. Each runner
# uploads its installers and update metadata into that shared draft, which
# electron-builder finds by tag. releaseType draft is kept as a fallback for the
# case where the draft does not exist yet. Mac overrides this with a per-arch channel.
publish:
  provider: github
  releaseType: draft
